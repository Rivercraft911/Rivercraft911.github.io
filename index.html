<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom CAPTCHA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Custom CAPTCHA</h1>
        <div>
            <img src="silly.jpg" alt="CAPTCHA" />
        </div>
        <div>
            <input type="text" id="userInput" placeholder="Enter the CAPTCHA" />
        </div>
        <button id="submitBtn" onclick="checkCaptcha()">Submit</button>
    </div>
    <script>
        function checkCaptcha() {
            const userInput = document.getElementById('userInput').value;
            if (userInput.toLowerCase() === 'b') {
                // Redirect to the chess site
                window.location.href = 'chess.html';
            } else {
                alert('Incorrect! Try again.');
                document.getElementById('submitBtn').disabled = true;
            }
        }
    </script>
</body>
</html>
